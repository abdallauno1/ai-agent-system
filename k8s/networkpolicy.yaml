apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-agent-system-default
  namespace: ai-agent-system
spec:
  podSelector:
    matchLabels:
      app: ai-agent-system
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - {}
