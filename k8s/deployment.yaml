apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-agent-system
  namespace: ai-agent-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-agent-system
  template:
    metadata:
      labels:
        app: ai-agent-system
    spec:
      containers:
        - name: ai-agent-system
          image: ai-agent-system:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ai-agent-system-config
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
