apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-agent-system-config
  namespace: ai-agent-system
data:
  APP_NAME: ai-agent-system
  APP_ENV: prod
  LOG_LEVEL: INFO
  ALLOWED_TOOLS: summarize,classify,retrieve_context,answer_with_context
  MAX_INPUT_CHARS: "12000"
  DEFAULT_FALLBACK_TOOL: classify
  RETRY_ATTEMPTS: "2"
  RETRIEVE_TOP_K: "3"
